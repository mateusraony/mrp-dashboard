<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>MRP Dashboard</title>
  <script>
    // SPA fallback para Render Static Site (e qualquer host estático).
    // Quando o servidor não encontra /Dashboard, serve este 404.html.
    // Guardamos o caminho em sessionStorage e redirecionamos para a raiz.
    // O main.jsx lê o valor e restaura o caminho via history.replaceState.
    var path = window.location.pathname + window.location.search + window.location.hash;
    sessionStorage.setItem('spa_redirect', path);
    window.location.replace('/');
  </script>
</head>
<body></body>
</html>

name: Fetch Economic Calendar (ForexFactory)

on:
  schedule:
    # A cada 30 min nos dias úteis no horário de mercado US/EU (08:00-22:00 UTC)
    - cron: '*/30 8-21 * * 1-5'
    # Checks noturnos: 00:00 e 03:00 UTC (21:00 e 00:00 BRT) para usuários fora do horário de mercado
    - cron: '0 0,3 * * 1-6'
  workflow_dispatch:
    inputs:
      date_override:
        description: 'Não utilizado (mantido para compatibilidade)'
        required: false

jobs:
  fetch:
    name: Fetch & Store Events
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Fetch Economic Calendar via ForexFactory
        run: node scripts/fetch-investing-calendar.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"


name: Fetch Investing.com Calendar

on:
  schedule:
    # A cada 30 min nos dias úteis no horário de mercado US (11:00-22:00 UTC = 08:00-19:00 ET)
    - cron: '*/30 11-21 * * 1-5'
  workflow_dispatch:
    inputs:
      date_override:
        description: 'Override do período (formato YYYY-MM-DD)'
        required: false

jobs:
  fetch:
    name: Fetch & Store Events
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Fetch Investing.com Calendar
        run: node scripts/fetch-investing-calendar.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DATE_OVERRIDE: ${{ inputs.date_override }}

  notify:
    name: Send Event Notifications
    runs-on: ubuntu-latest
    needs: fetch
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Send Pre/Post Event Notifications
        run: node scripts/notify-investing-calendar.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

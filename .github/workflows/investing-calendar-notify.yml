name: Notify Economic Calendar Events

on:
  schedule:
    # A cada 5 min no horário de mercado (11:00–23:59 UTC = 08:00–20:59 BRT) para notificações pré/pós evento
    - cron: '*/5 11-23 * * 1-5'
    # Daily summary — 10:55 UTC = 07:55 BRT
    - cron: '55 10 * * 1-5'
    # Cobertura pós-mercado
    - cron: '*/5 0 * * 2-6'
  workflow_dispatch: {}

jobs:
  notify:
    name: Send Event Notifications
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Send Event Notifications (com Claude AI + daily summary + anti-dup)
        run: node scripts/notify-economic-calendar.mjs
        env:
          SUPABASE_URL:               ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY:  ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN:         ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:           ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY:          ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL:               ${{ vars.CLAUDE_MODEL || 'claude-haiku-4-5-20251001' }}

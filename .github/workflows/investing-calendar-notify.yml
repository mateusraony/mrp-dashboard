name: Notify Economic Calendar Events

on:
  schedule:
    # A cada 5 min no horário de mercado (08:00-22:00 UTC) para notificações pré/pós evento
    - cron: '*/5 8-21 * * 1-5'
  workflow_dispatch: {}

jobs:
  notify:
    name: Send Event Notifications
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Send Pre/Post Event Notifications
        run: node scripts/notify-investing-calendar.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
